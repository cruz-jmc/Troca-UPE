services:
  postgres-db:
    image: postgres:latest
    container_name: container_projetos_pessoais
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projetodb_jm_leh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: