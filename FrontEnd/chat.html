<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPE Desapego - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-700 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">🔄 UPE Desapego</h1>
            <div class="flex gap-4">
                <a href="index.html" class="hover:underline font-medium">📦 Voltar para Vitrine</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto my-8 p-4 max-w-4xl">
        <div class="bg-white rounded-lg shadow-md flex flex-col h-[600px]">
            
            <div class="bg-gray-50 p-4 border-b rounded-t-lg flex justify-between items-center">
                <div>
                    <h2 id="tituloChat" class="text-lg font-bold text-gray-800">💬 Sala de Negociação</h2>
                    <p id="statusChat" class="text-xs text-green-500 font-medium">● Conectando...</p>
                </div>
                <button onclick="carregarMensagens()" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                    🔄 Atualizar Conversa
                </button>
            </div>

            <div id="corpoMensagens" class="flex-1 p-4 overflow-y-auto bg-gray-50 space-y-4">
                </div>

            <div class="p-4 border-t bg-white rounded-b-lg">
                <form id="formMensagem" class="flex gap-2">
                    <input type="text" id="textoMensagem" placeholder="Digite sua proposta..." required 
                           class="flex-1 p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded-md transition">
                        Enviar
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        
        let CHAT_ID_ATIVO = 1;      
        let USUARIO_LOGADO_ID = 2;  

        // Lê os parâmetros da URL preenchidos pelo clique do botão "Interesse"
        function inicializarChatAutomatico() {
            const parametros = new URLSearchParams(window.location.search);
            const idVendedor = parametros.get('vendedor');
            const idAnuncio = parametros.get('anuncio');
            const idComprador = parametros.get('comprador');

            if (idAnuncio && idComprador) {
                CHAT_ID_ATIVO = parseInt(idAnuncio);
                USUARIO_LOGADO_ID = parseInt(idComprador);
                
                document.getElementById('tituloChat').innerText = `💬 Negociando Anúncio #${idAnuncio}`;
                document.getElementById('statusChat').innerText = `● Falando com Vendedor ID: ${idVendedor} | Logado como Comprador ID: ${USUARIO_LOGADO_ID}`;
            } else {
                document.getElementById('tituloChat').innerText = `💬 Sala de Negociação (Chat ID: ${CHAT_ID_ATIVO})`;
                document.getElementById('statusChat').innerText = `● Logado como Usuário ID: ${USUARIO_LOGADO_ID}`;
            }
            carregarMensagens();
        }

        async function carregarMensagens() {
            const corpo = document.getElementById('corpoMensagens');
            try {
                const response = await fetch(`${API_URL}/mensagens/${CHAT_ID_ATIVO}`);
                if (!response.ok) throw new Error();

                const mensagens = await response.json();
                corpo.innerHTML = '';

                if (mensagens.length === 0) {
                    corpo.innerHTML = `<p class="text-gray-400 text-center italic my-4">Nenhuma mensagem nesta sala. Envie uma proposta!</p>`;
                    return;
                }

                mensagens.forEach(msg => {
                    const idAutorMsg = msg.id_usuario || msg.id_remetente || msg.id_autor;
                    const ehMinha = idAutorMsg === USUARIO_LOGADO_ID;
                    
                    const balao = `
                        <div class="flex ${ehMinha ? 'justify-end' : 'justify-start'}">
                            <div class="${ehMinha ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-800'} p-3 rounded-lg max-w-md shadow-sm">
                                <span class="block text-[10px] opacity-75 font-mono mb-1">${ehMinha ? 'Você' : 'ID Autor: ' + idAutorMsg}</span>
                                <p class="text-sm">${msg.conteudo || msg.texto || msg.mensagem}</p>
                            </div>
                        </div>
                    `;
                    corpo.innerHTML += balao;
                });
                corpo.scrollTop = corpo.scrollHeight;
            } catch (error) {
                if (corpo.innerHTML === "") {
                    corpo.innerHTML = `<p class="text-gray-400 text-center italic my-4">Conectado na Sala do Anúncio #${CHAT_ID_ATIVO}. Mande uma mensagem!</p>`;
                }
            }
        }

        function renderizarMensagemLocal(texto) {
            const corpo = document.getElementById('corpoMensagens');
            if (corpo.querySelector('p.italic')) corpo.innerHTML = '';
            
            const balao = `
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white p-3 rounded-lg max-w-md shadow-sm">
                        <span class="block text-[10px] opacity-75 font-mono mb-1">Você (ID: ${USUARIO_LOGADO_ID})</span>
                        <p class="text-sm">${texto}</p>
                    </div>
                </div>
            `;
            corpo.innerHTML += balao;
            corpo.scrollTop = corpo.scrollHeight;
        }

        document.getElementById('formMensagem').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('textoMensagem');
            const texto = input.value;

            renderizarMensagemLocal(texto);
            input.value = '';

            try {
                await fetch(`${API_URL}/mensagens/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id_chat: CHAT_ID_ATIVO, 
                        id_autor: USUARIO_LOGADO_ID, 
                        conteudo: texto 
                    })
                });
            } catch (error) {
                console.log("Mantido na interface.");
            }
        });

        window.onload = inicializarChatAutomatico;
    </script>
</body>
</html>
